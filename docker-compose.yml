services:
  copilot-proxy:
    build: .
    ports:
      - "8779:8779"
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:8000}
      - DROP_FIELDS=${DROP_FIELDS:-stream_options,parallel_tool_calls,service_tier}
      - DEBUG=${DEBUG:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
